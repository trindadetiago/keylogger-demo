<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keylogger Demo - UFPB Seguranca Computacional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff41;
            min-height: 100vh;
        }

        .header {
            background: #111;
            border-bottom: 2px solid #00ff41;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.4em;
            text-shadow: 0 0 10px #00ff41;
        }

        .header .badge {
            background: #ff4444;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            font-family: Arial, sans-serif;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .panel {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }

        .panel-header {
            background: #1a1a1a;
            padding: 12px 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 {
            font-size: 1em;
            color: #00ff41;
        }

        .panel-body {
            padding: 15px 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        /* Texto reconstruido */
        .reconstructed-text {
            grid-column: 1 / -1;
        }

        #text-output {
            font-size: 1.6em;
            line-height: 1.8;
            word-wrap: break-word;
            min-height: 80px;
            color: #fff;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
        }

        #text-output .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background: #00ff41;
            animation: blink 1s infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Log de teclas */
        .keystroke-entry {
            display: flex;
            gap: 15px;
            padding: 4px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 0.85em;
        }

        .keystroke-entry .time {
            color: #666;
            flex-shrink: 0;
        }

        .keystroke-entry .key {
            color: #00ff41;
            font-weight: bold;
        }

        .keystroke-entry .key.special {
            color: #ff8800;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .stat-box {
            text-align: center;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 6px;
        }

        .stat-box .number {
            font-size: 2em;
            color: #00ff41;
            text-shadow: 0 0 10px #00ff41;
        }

        .stat-box .label {
            font-size: 0.75em;
            color: #666;
            margin-top: 5px;
        }

        /* Toolbar */
        .toolbar {
            grid-column: 1 / -1;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background: #1a1a1a;
            color: #00ff41;
            border: 1px solid #00ff41;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #00ff41;
            color: #000;
        }

        .btn.danger {
            border-color: #ff4444;
            color: #ff4444;
        }

        .btn.danger:hover {
            background: #ff4444;
            color: #fff;
        }

        .status-bar {
            grid-column: 1 / -1;
            text-align: center;
            color: #666;
            font-size: 0.8em;
            padding: 10px;
        }

        .status-bar .connected {
            color: #00ff41;
        }

        .status-bar .disconnected {
            color: #ff4444;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>&gt;_ KEYLOGGER DEMO // UFPB - Seguranca Computacional</h1>
        <span class="badge">DEMO EDUCACIONAL</span>
    </div>

    <div class="container">
        <!-- Texto reconstruido -->
        <div class="panel reconstructed-text">
            <div class="panel-header">
                <h2>&gt; TEXTO RECONSTRUIDO</h2>
                <span id="client-info" style="color: #666; font-size: 0.8em;"></span>
            </div>
            <div class="panel-body">
                <div id="text-output"><span class="cursor"></span></div>
            </div>
        </div>

        <!-- Log de teclas brutas -->
        <div class="panel">
            <div class="panel-header">
                <h2>&gt; LOG DE TECLAS</h2>
                <span id="log-count" style="color: #666; font-size: 0.8em;">0 teclas</span>
            </div>
            <div class="panel-body" id="keystroke-log">
                <div style="color: #666;">Aguardando teclas...</div>
            </div>
        </div>

        <!-- Estatisticas -->
        <div class="panel">
            <div class="panel-header">
                <h2>&gt; ESTATISTICAS</h2>
            </div>
            <div class="panel-body">
                <div class="stats">
                    <div class="stat-box">
                        <div class="number" id="total-keys">0</div>
                        <div class="label">TOTAL TECLAS</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="keys-per-min">0</div>
                        <div class="label">TECLAS/MIN</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="special-keys">0</div>
                        <div class="label">TECLAS ESPECIAIS</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <button class="btn danger" onclick="clearLog()">LIMPAR LOG</button>
        </div>

        <div class="status-bar">
            Status: <span id="status" class="disconnected">desconectado</span>
        </div>
    </div>

    <script>
        const socket = io();
        let totalKeys = 0;
        let specialKeysCount = 0;
        let startTime = null;
        let reconstructedText = "";

        const SPECIAL_KEYS = [
            "Key.space", "Key.enter", "Key.backspace", "Key.tab",
            "Key.shift", "Key.shift_r", "Key.ctrl_l", "Key.ctrl_r",
            "Key.alt_l", "Key.alt_r", "Key.cmd", "Key.cmd_r",
            "Key.caps_lock", "Key.esc", "Key.delete",
            "Key.up", "Key.down", "Key.left", "Key.right"
        ];

        socket.on("connect", () => {
            document.getElementById("status").textContent = "conectado";
            document.getElementById("status").className = "connected";
        });

        socket.on("disconnect", () => {
            document.getElementById("status").textContent = "desconectado";
            document.getElementById("status").className = "disconnected";
        });

        socket.on("new_keystroke", (data) => {
            if (!startTime) startTime = Date.now();
            totalKeys++;

            const isSpecial = SPECIAL_KEYS.includes(data.key) ||
                              data.key.startsWith("Key.");

            if (isSpecial) specialKeysCount++;

            // Atualiza texto reconstruido
            updateReconstructedText(data.key);

            // Adiciona ao log
            addToLog(data, isSpecial);

            // Atualiza estatisticas
            updateStats();
        });

        socket.on("log_cleared", () => {
            totalKeys = 0;
            specialKeysCount = 0;
            startTime = null;
            reconstructedText = "";
            document.getElementById("text-output").innerHTML = '<span class="cursor"></span>';
            document.getElementById("keystroke-log").innerHTML =
                '<div style="color: #666;">Aguardando teclas...</div>';
            updateStats();
        });

        function updateReconstructedText(key) {
            if (key === "Key.space") {
                reconstructedText += " ";
            } else if (key === "Key.enter") {
                reconstructedText += "\n";
            } else if (key === "Key.backspace") {
                reconstructedText = reconstructedText.slice(0, -1);
            } else if (key === "Key.tab") {
                reconstructedText += "    ";
            } else if (!key.startsWith("Key.")) {
                reconstructedText += key;
            }

            const el = document.getElementById("text-output");
            const escaped = reconstructedText
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\n/g, "<br>");
            el.innerHTML = escaped + '<span class="cursor"></span>';
        }

        function addToLog(data, isSpecial) {
            const log = document.getElementById("keystroke-log");

            // Remove placeholder
            if (totalKeys === 1) log.innerHTML = "";

            const entry = document.createElement("div");
            entry.className = "keystroke-entry";

            let displayKey = data.key;
            if (data.key === "Key.space") displayKey = "[SPACE]";
            else if (data.key === "Key.enter") displayKey = "[ENTER]";
            else if (data.key === "Key.backspace") displayKey = "[BACKSPACE]";
            else if (data.key === "Key.tab") displayKey = "[TAB]";
            else if (data.key === "Key.shift") displayKey = "[SHIFT]";
            else if (data.key === "Key.caps_lock") displayKey = "[CAPSLOCK]";
            else if (data.key === "Key.esc") displayKey = "[ESC]";
            else if (data.key.startsWith("Key.")) displayKey = `[${data.key.replace("Key.", "").toUpperCase()}]`;

            entry.innerHTML = `
                <span class="time">${data.timestamp}</span>
                <span class="key ${isSpecial ? 'special' : ''}">${displayKey}</span>
            `;

            log.insertBefore(entry, log.firstChild);
            document.getElementById("log-count").textContent = `${totalKeys} teclas`;
        }

        function updateStats() {
            document.getElementById("total-keys").textContent = totalKeys;
            document.getElementById("special-keys").textContent = specialKeysCount;

            if (startTime) {
                const minutes = (Date.now() - startTime) / 60000;
                const kpm = minutes > 0 ? Math.round(totalKeys / minutes) : 0;
                document.getElementById("keys-per-min").textContent = kpm;
            }
        }

        function clearLog() {
            fetch("/api/clear", { method: "POST" });
        }
    </script>
</body>
</html>
